services:
  - type: web
    name: securiti-gpt-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: VIRUSTOTAL_API_KEY
        sync: false
      - key: HIBP_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: securiti-gpt-db
          property: connectionString

  - type: postgres
    name: securiti-gpt-db
    ipAllowList: []
