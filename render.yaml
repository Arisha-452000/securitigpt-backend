services:
  - type: web
    name: securiti-gpt-backend
    runtime: python
    buildCommand: |
      cd backend && pip install -r requirements.txt
    startCommand: |
      cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.0
      - key: DATABASE_URL
        value: sqlite:///./securitigpt.db
      - key: SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false  # You'll need to set this manually in Render dashboard
      - key: VIRUSTOTAL_API_KEY
        sync: false  # You'll need to set this manually in Render dashboard
      - key: HIBP_API_KEY
        value: mock_key
      - key: RAPID_API_KEY
        sync: false  # Set this in the Render dashboard
    healthCheckPath: /health
    autoDeploy: true
