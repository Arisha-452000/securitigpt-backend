services:
  - type: web
    name: securiti-gpt-backend
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      cd app && python -c "from main import app; from database import engine; from models import Base; Base.metadata.create_all(bind=engine); print('Database initialized')"
    startCommand: |
      cd backend
      gunicorn -w 1 -k uvicorn.workers.UvicornWorker app.main:app --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.0
      - key: DATABASE_URL
        value: sqlite:///./securitigpt.db
      - key: SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false  # You'll need to set this manually in Render dashboard
      - key: VIRUSTOTAL_API_KEY
        sync: false  # You'll need to set this manually in Render dashboard
      - key: HIBP_API_KEY
        value: mock_key
    healthCheckPath: /health
    autoDeploy: true
